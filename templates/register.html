{% extends 'base.html' %}
{% block head %}
    <title>{{ form_title }}</title>
{% endblock %}
{% block body %}
    <p>{{ form_title }}です</p>
<form method="POST">
    <!-- CSRF対策(トークンが生成される) -->
    {{ form.hidden_tag() }}

    <div>
        {{ form.name.label }} {{ form.name(value=event.name) }}
    </div>
    <div>
        {{ form.date.label }} {{ form.date(value=event.date) }}
    </div>
    {{ form.submit() }}
</form>
    <a href="{{url_for('calender')}}">戻る</a>
{% endblock %}
